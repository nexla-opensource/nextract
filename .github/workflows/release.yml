name: Release to PyPI

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Set version from release tag
      shell: bash
      run: |
        TAG_NAME="${{ github.event.release.tag_name || github.ref_name }}"
        VERSION="${TAG_NAME#v}"
        echo "Release tag: ${TAG_NAME} -> Version: ${VERSION}"
        if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(.*)?$ ]]; then
          echo "Error: tag '${TAG_NAME}' does not look like a version (e.g. v0.1.1 or 0.1.1)" >&2
          exit 1
        fi
        if ! grep -q '^version\s*=' pyproject.toml; then
          echo "No version field found to update in pyproject.toml" >&2
          exit 1
        fi
        sed -i "s/^version\s*=\s*\"[^\"]*\"/version = \"${VERSION}\"/" pyproject.toml
        echo "pyproject.toml version updated to ${VERSION}"
        grep '^version' pyproject.toml

    - name: Build package
      run: |
        python -m build

    - name: Verify build contents
      run: |
        echo "=== Built packages ==="
        ls -la dist/
        echo "=== Checking wheel contents ==="
        python -m zipfile -l dist/*.whl | head -20

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
